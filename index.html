<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#06061a" />
    <title>Slime Pop Protocol</title>
    <script src="https://sdk.crazygames.com/crazygames-sdk-v3.js"></script>
    <style>
      :root {
        color-scheme: dark;
        font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #03030d;
        color: #e7f6ff;
      }
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        /* Subtle ambient star-bed behind the canvas frame, peeking out when
         * Phaser's Scale.FIT leaves letterbox bars on tall/short windows. */
        background:
          radial-gradient(circle at 14% 18%, rgba(111, 252, 255, 0.08), transparent 40%),
          radial-gradient(circle at 84% 76%, rgba(255, 108, 242, 0.07), transparent 38%),
          radial-gradient(circle at 50% 50%, #0b0d24 0%, #03030d 70%);
      }
      #game-root {
        position: relative;
        width: 100vw;
        height: 100vh;
        background:
          radial-gradient(circle at 68% 38%, rgba(111, 252, 255, 0.14), transparent 34%),
          radial-gradient(circle at 28% 76%, rgba(255, 108, 242, 0.11), transparent 30%),
          linear-gradient(135deg, #07091f 0%, #03030d 76%);
      }
      #game-root canvas {
        display: block;
        margin: 0 auto;
        box-shadow: 0 18px 60px rgba(0, 0, 0, 0.38);
        image-rendering: auto;
      }
      /* Phaser injects its DOM container as a sibling of the canvas.  Pin it
       * to the same box so the world-space elements line up perfectly. */
      #game-root > div[style*="position: absolute"] {
        pointer-events: none;
      }
      #boot-overlay {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background:
          radial-gradient(circle at 50% 42%, rgba(111, 252, 255, 0.18), transparent 32%),
          radial-gradient(circle at 50% 70%, rgba(255, 108, 242, 0.10), transparent 36%),
          #06061a;
        color: #6ffcff;
        font-size: 13px;
        letter-spacing: 3px;
        z-index: 50;
        pointer-events: none;
        transition: opacity 0.45s ease;
      }
      #boot-overlay::before {
        content: "";
        width: 56px;
        height: 56px;
        margin-bottom: 24px;
        border-radius: 50%;
        background:
          radial-gradient(circle at 35% 30%, #ffffff 0%, #c7f7fb 14%, #6ffcff 40%, #1f5a85 70%, transparent 100%);
        box-shadow:
          0 0 18px rgba(111, 252, 255, 0.7),
          0 0 36px rgba(111, 252, 255, 0.4);
        animation: boot-orb 1.6s ease-in-out infinite;
      }
      @keyframes boot-orb {
        0%, 100% { transform: scale(1);   filter: brightness(1); }
        50%      { transform: scale(1.1); filter: brightness(1.3); }
      }
      #boot-overlay.hidden { opacity: 0; }
      .pulse {
        animation: pulse 1.2s ease-in-out infinite;
      }
      @keyframes pulse {
        0%, 100% { opacity: 0.45; }
        50%      { opacity: 1; }
      }
    </style>
  </head>
  <body>
    <div id="game-root">
      <div id="boot-overlay"><span class="pulse">BOOTING CONTAINMENT GRID...</span></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
