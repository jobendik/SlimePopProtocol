<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#06061a" />
    <title>Slime Pop Protocol</title>
    <script src="https://sdk.crazygames.com/crazygames-sdk-v3.js"></script>
    <style>
      :root {
        color-scheme: dark;
        font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #06061a;
        color: #e7f6ff;
      }
      body {
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #game-root {
        position: relative;
        width: 100vw;
        height: 100vh;
        background:
          radial-gradient(circle at 68% 38%, rgba(111, 252, 255, 0.14), transparent 34%),
          radial-gradient(circle at 28% 76%, rgba(255, 108, 242, 0.11), transparent 30%),
          linear-gradient(135deg, #07091f 0%, #03030d 76%);
      }
      #game-root canvas {
        display: block;
        margin: 0 auto;
        box-shadow: 0 18px 60px rgba(0, 0, 0, 0.38);
        /* The game's procedural art is smooth (gradients, circles, rounded
         * rects) — NOT pixel art. Force the browser to smooth-scale instead
         * of nearest-neighbour-scale, which previously made everything look
         * blocky on any display larger than the 960x540 logical resolution. */
        image-rendering: auto;
      }
      #boot-overlay {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background:
          radial-gradient(circle at 50% 42%, rgba(111, 252, 255, 0.14), transparent 28%),
          #06061a;
        color: #6ffcff;
        font-size: 14px;
        letter-spacing: 2px;
        z-index: 5;
        pointer-events: none;
        transition: opacity 0.45s ease;
      }
      #boot-overlay.hidden { opacity: 0; }
      .pulse {
        animation: pulse 1.2s ease-in-out infinite;
      }
      @keyframes pulse {
        0%, 100% { opacity: 0.45; }
        50%      { opacity: 1; }
      }
    </style>
  </head>
  <body>
    <div id="game-root">
      <div id="boot-overlay"><span class="pulse">BOOTING CONTAINMENT GRID...</span></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
